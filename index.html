<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TideWatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <header id="app-header">
      <div id="brand">
        <span id="brand-mark">◈</span>
        <span id="brand-name">TideWatch</span>
      </div>
    </header>

    <main id="main-content">

      <!-- Geolocation / station lookup status -->
      <section id="status-section">
        <div id="status-card">
          <div id="status-icon" class="status-waiting">◎</div>
          <div id="status-text">
            <p id="status-headline">Locating you</p>
            <p id="status-detail">Requesting geolocation permission…</p>
          </div>
        </div>
      </section>

      <!-- Station card — stays boxed -->
      <section id="station-section" class="hidden">
        <div id="station-card">
          <div id="station-header">
            <span id="station-label">Tide station</span>
            <span id="station-type-badge"></span>
          </div>
          <div id="station-name"></div>
          <div id="station-meta">
            <span id="station-id-display"></span>
          </div>
          <div id="candidates-toggle" onclick="toggleCandidates()">View nearby stations ▾</div>
          <div id="candidates-list" class="hidden"></div>
        </div>
      </section>

      <!-- Tide chart — unboxed, sits on page background -->
      <section id="chart-section" class="hidden">

        <!-- Loading state — uses a card -->
        <div id="chart-status-card" class="hidden">
          <div id="chart-status-icon" class="status-loading">◎</div>
          <div id="chart-status-text">
            <p id="chart-status-headline">Loading tide data</p>
            <p id="chart-status-detail">Fetching predictions from NOAA…</p>
          </div>
        </div>

        <!-- Chart — no card wrapper -->
        <div id="chart-card" class="hidden">
          <div id="chart-header">
            <div id="chart-date-label"></div>
          </div>
          <div id="chart-container">
            <canvas id="tide-canvas"></canvas>
          </div>
          <div id="chart-meta">MLLW &bull; ft &middot; v1.9</div>
        </div>

        <!-- Error state — uses a card -->
        <div id="chart-error-card" class="hidden">
          <div id="chart-error-icon">⚠</div>
          <div id="chart-error-text">
            <p id="chart-error-headline">Tide data unavailable</p>
            <p id="chart-error-detail"></p>
          </div>
        </div>

      </section>

    </main>

  </div>

  <script src="station.js"></script>
  <script src="chart.js"></script>
</body>
</html>
